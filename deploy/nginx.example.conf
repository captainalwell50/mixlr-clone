# Example nginx snippets — Laravel + MediaMTX (8888 HLS, 8889 WHIP/WebRTC HTTP).
# Adjust server_name, root, php.sock, TLS.

upstream mediamtx_hls {
	server 127.0.0.1:8888;
}

upstream mediamtx_rtc {
	server 127.0.0.1:8889;
}

server {
	listen 443 ssl http2;
	server_name stream.example.org;
	root /var/www/app/public;

	# ssl_certificate ...
	# ssl_certificate_key ...

	index index.php;

	location /hls/ {
		proxy_pass http://mediamtx_hls/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		add_header Cache-Control "public, max-age=5" always;
	}

	location /rtc/ {
		rewrite ^/rtc/(.*)$ /$1 break;
		proxy_pass http://mediamtx_rtc;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
	}

	location / {
		try_files $uri $uri/ /index.php?$query_string;
	}

	location ~ \.php$ {
		include snippets/fastcgi-php.conf;
		fastcgi_pass unix:/run/php/php8.4-fpm.sock;
	}
}
