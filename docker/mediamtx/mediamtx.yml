# Browser publish: POST SDP to http://<host>:8889/live/<uuid>/whip
# HLS playback:    http://<host>:8888/live/<uuid>/index.m3u8
# Azure / NAT: set webrtcAdditionalHosts to your public hostname or VM IP.

logLevel: info

# External auth → Laravel /api/mediamtx/auth
# Local Docker: host.docker.internal:8000. Production: set to https://<host>/api/mediamtx/auth
authMethod: http
authHTTPAddress: http://host.docker.internal:8000/api/mediamtx/auth
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof

webrtc: true
webrtcAddress: :8889
webrtcEncryption: false
webrtcAllowOrigins: ['*']
webrtcLocalUDPAddress: :8189
# Docker advertises bridge IPs if true — break ICE from browsers. Prefer false + public hosts.
webrtcIPsFromInterfaces: false
# Local: leave empty. Production Azure VM: list public IP and hostname.
webrtcAdditionalHosts: []

hls: true
hlsAddress: :8888
hlsEncryption: false
hlsAllowOrigins: ['*']
# Standard fMP4 (not lowLatency) — far more stable for Opus audio; less stutter.
hlsVariant: fmp4
hlsSegmentCount: 5
hlsSegmentDuration: 4s
# Remux Opus as-is into fMP4; do not re-encode (preserves studio bitrate).
hlsAlwaysRemux: true

# OBS / ffmpeg ingest (publish auth via Laravel HTTP callback + stream_key)
rtmp: true
rtmpAddress: :1935
rtmpEncryption: "no"

pathDefaults:
  source: publisher
  overridePublisher: true
  record: true
  recordFormat: fmp4
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordPartDuration: 1s
  recordSegmentDuration: 4h
  recordDeleteAfter: 8760h
  runOnReady: sh /hooks/run-ready.sh
  runOnNotReady: sh /hooks/run-not-ready.sh
  runOnRecordSegmentComplete: sh /hooks/run-record-segment-complete.sh

paths:
  '~^live/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$':
    source: publisher
